# This file was auto-generated by your AI Assistant to enable automatic deployment to Firebase.
# It will deploy to Firebase Hosting on every push to the main branch.

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PREMIUM_FLEET_0105 }}'
          channelId: live
          projectId: premium-fleet-0105
